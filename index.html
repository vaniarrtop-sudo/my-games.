<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПВО СИМУЛЯТОР — ОФИЦИАЛЬНЫЙ САЙТ</title>
    <style>
        body {
            margin: 0;
            background: #050505;
            color: white;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .hero-box {
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #ff3300;
            padding: 50px;
            border-radius: 5px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 0 40px rgba(255, 51, 0, 0.2);
        }

        h1 {
            font-size: 3.5rem;
            color: #ff3300;
            text-shadow: 0 0 20px #ff3300;
            margin: 0 0 10px 0;
            letter-spacing: 3px;
        }

        .status {
            color: #00ff00;
            margin-bottom: 30px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .description {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            color: #ccc;
        }

        .launch-btn {
            display: inline-block;
            padding: 20px 50px;
            background: #ff3300;
            color: white;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 3px;
            transition: 0.2s;
            box-shadow: 0 5px 0 #992200;
        }

        .launch-btn:hover {
            background: #ff4411;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #992200;
        }

        .launch-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #992200;
        }

        footer {
            position: absolute;
            bottom: 20px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="hero-box">
        <h1>ПВО СИМУЛЯТОР</h1>
        <div class="status">[ СИСТЕМА АКТИВИРОВАНА ]</div>
        
        <p class="description">
            Защити город от воздушной угрозы. Используй систему наведения, 
            следи за радаром и уничтожай цели. <br>
            <b>Версия: CodePen Edition.</b>
        </p>

        <a href="https://codepen.io/ofqyczkx-the-flexboxer/pen/myrKbeK" target="_blank" class="launch-btn">ЗАПУСТИТЬ СИСТЕМУ</a>
    </div>

    <footer>
        РАЗРАБОТЧИК: ИВАН | 6 КЛАСС | 2026
    </footer>

</body>
</html>
