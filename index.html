<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПВО СИМУЛЯТОР — ИГРАТЬ</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Чтобы не было лишних прокруток */
            background: #000;
        }

        /* Окно с игрой на весь экран */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Маленькая подпись в углу, чтобы выглядело профессионально */
        .dev-tag {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 5px 10px;
            font-family: monospace;
            font-size: 12px;
            border-radius: 5px;
            pointer-events: none; /* Чтобы не мешала кликать в игре */
        }
    </style>
</head>
<body>

    <iframe src="https://cdpn.io/ofqyczkx-the-flexboxer/fullcpgrid/myrKbeK" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
    </iframe>

    <div class="dev-tag">DEV: IVAN | 2026</div>

</body>
</html>
